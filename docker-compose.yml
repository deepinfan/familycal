services:
  postgres:
    image: postgres:16
    container_name: homecal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: homecal
    ports:
      - "5432:5432"
    volumes:
      - homecal_pg_data:/var/lib/postgresql/data

volumes:
  homecal_pg_data:
